
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDH لتعليم البرمجة</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            background: #d40000;
            padding: 25px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        .welcome {
            text-align: center;
            padding: 50px 20px;
        }

        .welcome h2 {
            font-size: 28px;
        }

        .courses {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .course {
            background: #222;
            width: 250px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .course h3 {
            color: #ff3333;
        }

        button {
            background: #d40000;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
        }

        footer {
            background: #d40000;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>💻 UDH لتعليم البرمجة</h1>
    </header>

    <div class="welcome">
        <h2>مرحبًا بك في UDH 👋</h2>
        <p>تعلم البرمجة خطوة بخطوة بطريقة سهلة وممتعة.</p>
        <button>ابدأ التعلم</button>
    </div>

    <div class="courses">

        <div class="course">
            <h3>📄 HTML</h3>
            <p>تعلم كيف تبني صفحات المواقع.</p>
            <button>ابدأ الدرس</button>
        </div>

        <div class="course">
            <h3>🎨 CSS</h3>
            <p>تعلم كيف تجعل موقعك جميلًا.</p>
            <button>ابدأ الدرس</button>
        </div>

        <div class="course">
            <h3>⚡ JavaScript</h3>
            <p>تعلم كيف تجعل موقعك تفاعليًا.</p>
            <button>ابدأ الدرس</button>
        </div>

        <div class="course">
            <h3>🐍 Python</h3>
            <p>ابدأ تعلم لغة Python من الصفر.</p>
            <button>ابدأ الدرس</button>
        </div>

    </div>

    <footer>
        © 2026 UDH - جميع الحقوق محفوظة
    </footer>

</body>
</html>
